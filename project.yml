name: TerrariumLog
options:
  bundleIdPrefix: com.example

configs:
  Debug: {}
  Release: {}

packages:
  VLCKitSPM:
    url: https://github.com/tylerjonesio/vlckit-spm.git
    exactVersion: 3.6.0

settings:
  PRODUCT_BUNDLE_IDENTIFIER: com.example.terrariumlog

targets:
  TerrariumLog:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - TerrariumLog/TerrariumLog
      - TerrariumLog/Shared
    settings:
      INFO_PLIST_FILE: TerrariumLog/TerrariumLog/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.example.terrariumlog
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: TerrariumLog/TerrariumLog/TerrariumLog.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.terrariumlog
    dependencies:
      - target: TerrariumLogWidgetExtension
        embed: true
      - package: VLCKitSPM
        product: VLCKitSPM

  TerrariumLogWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - TerrariumLog/TerrariumLogWidget
      - TerrariumLog/Shared
    settings:
      INFO_PLIST_FILE: TerrariumLog/TerrariumLogWidget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.example.terrariumlog.widget
      PRODUCT_NAME: TerrariumLogWidget
    entitlements:
      path: TerrariumLog/TerrariumLogWidget/TerrariumLogWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.terrariumlog

  TerrariumLogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - TerrariumLog/TerrariumLogTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.example.terrariumlogtests
    dependencies:
      - target: TerrariumLog

schemes:
  TerrariumLog:
    build:
      targets:
        TerrariumLog: all
        TerrariumLogWidgetExtension: all
        TerrariumLogTests: [test]
    test:
      targets:
        - TerrariumLogTests
    run:
      config: Debug
