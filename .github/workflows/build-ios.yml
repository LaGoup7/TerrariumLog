name: Build iOS

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Inspect repository
        run: |
          echo "Repository root: $GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"
          echo "Contents of TerrariumLog folder:"
          ls -la "$GITHUB_WORKSPACE/TerrariumLog" || true

      - name: Show Swift version
        run: swift --version || true

      - name: Install xcodegen
        run: |
          brew install xcodegen || true

      - name: Generate Xcode project with xcodegen
        run: |
          cd "$GITHUB_WORKSPACE"
          xcodegen generate --spec project.yml

      - name: Resolve available simulator
        run: |
          DEVICE=$(xcrun simctl list devices available iOS | grep -m 1 "iPhone" | sed -E 's/^ *(.+) \([0-9A-F-]+\).*/\1/')
          if [ -z "$DEVICE" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "Using simulator: $DEVICE"
          echo "SIMULATOR_NAME=$DEVICE" >> "$GITHUB_ENV"

      - name: Build app for simulator
        run: |
          cd "$GITHUB_WORKSPACE"
          xcodebuild -project TerrariumLog.xcodeproj \
            -scheme TerrariumLog \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -configuration Debug \
            -derivedDataPath build build

      - name: Run unit tests
        run: |
          cd "$GITHUB_WORKSPACE"
          xcodebuild -project TerrariumLog.xcodeproj \
            -scheme TerrariumLog \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -derivedDataPath build test

      - name: Boot simulator and install app
        run: |
          set -e
          xcrun simctl shutdown all || true
          xcrun simctl boot "$SIMULATOR_NAME" || true
          sleep 3
          cd "$GITHUB_WORKSPACE"
          APP_PATH=$(find build -name "TerrariumLog.app" | head -n 1)
          echo "Found app at: $APP_PATH"
          mkdir -p screenshots
          if [ -n "$APP_PATH" ]; then
            xcrun simctl install booted "$APP_PATH" || true
            xcrun simctl launch booted com.example.terrariumlog || true
            sleep 2
            xcrun simctl io booted screenshot screenshots/home.png || true
          else
            echo "App not found; skipping install/screenshot"
          fi

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots
